<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eightfold Autofill</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

<div class="bg-mesh"></div>

<div class="container">

  <div class="header">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L4.09 12.96A1 1 0 005 14.5h5.5L11 22l8.91-10.96A1 1 0 0019 9.5H13.5L13 2z"/>
      </svg>
    </div>
    <div class="brand">
      <span class="brand-name">Eightfold Autofill</span>
      <span class="brand-sub">PTC Extension</span>
    </div>
    <div class="status-pill">
      <div class="dot"></div>
      Ready
    </div>
  </div>

  <div class="divider"></div>

  <div class="hero">
    <div class="hero-title">Autofill Your Application</div>
    <p class="hero-desc">Instantly fill your job application fields with your saved profile — one click, done.</p>
  </div>

  <button class="btn" id="autofillBtn">
    <span id="btnText">Autofill Now</span>
  </button>

  <div id="statusMsg" class="status-msg hidden"></div>

  <div class="footer-note">Powered by <span class="accent">Eightfold.ai</span> · Smart Apply</div>

</div>

<script src="popup.js"></script>
</body>
</html>
