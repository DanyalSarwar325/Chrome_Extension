<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eightfold Autofill</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.35);
      --accent2: #06b6d4;
      --text: #e8edf5;
      --muted: #6b7fa3;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      padding: 0;
    }

    /* Animated mesh background */
    .bg-mesh {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 180px 120px at 10% 20%, rgba(59,130,246,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 140px 100px at 90% 80%, rgba(6,182,212,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      padding: 24px 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-ring {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
      flex-shrink: 0;
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 16px var(--accent-glow); }
      50% { box-shadow: 0 0 28px rgba(59,130,246,0.55); }
    }

    .logo-ring svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .brand-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Status pill */
    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 10px;
      color: #34d399;
      letter-spacing: 0.04em;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #34d399;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* Hero text */
    .hero {
      text-align: center;
      padding: 4px 0 2px;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(135deg, #e8edf5 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hero-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 240px;
      margin: 0 auto;
    }

    /* CTA Button */
    .btn {
      position: relative;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(59,130,246,0.5); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn svg { width: 15px; height: 15px; fill: white; }

    /* Success state */
    .btn.success {
      background: linear-gradient(135deg, #059669, #10b981);
      box-shadow: 0 4px 20px rgba(16,185,129,0.4);
    }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .footer-note span {
      color: var(--accent);
    }
  </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo-ring">
      <!-- Lightning bolt icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L4.09 12.96A1 1 0 005 14.5h5.5L11 22l8.91-10.96A1 1 0 0019 9.5H13.5L13 2z"/>
      </svg>
    </div>
    <div class="brand">
      <span class="brand-name">Eightfold Autofill</span>
      <span class="brand-sub">PTC Extension</span>
    </div>
    <div class="status-pill">
      <div class="dot"></div>
      Ready
    </div>
  </div>

  <div class="divider"></div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-title">Autofill Your<br/>Application</div>
    <p class="hero-desc">Instantly fill your job application fields with your saved profile — one click, done.</p>
  </div>

  <!-- CTA -->
  <button class="btn" id="autofillBtn" onclick="handleAutofill()">
    <div class="btn-inner" id="btnContent">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L4.09 12.96A1 1 0 005 14.5h5.5L11 22l8.91-10.96A1 1 0 0019 9.5H13.5L13 2z"/>
      </svg>
      Autofill Now
    </div>
  </button>

  <!-- Footer -->
  <div class="footer-note">Powered by <span>Eightfold.ai</span> · Smart Apply</div>

</div>

<script>
  function handleAutofill() {
    const btn = document.getElementById('autofillBtn');
    const content = document.getElementById('btnContent');

    // Send message to content script
    chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
      chrome.tabs.sendMessage(tabs[0].id, { action: 'autofill' });
    });

    // Visual feedback
    btn.classList.add('success');
    content.innerHTML = `
      <svg viewBox="0 0 24 24" fill="white" width="15" height="15">
        <path d="M20 6L9 17l-5-5"/>
        <polyline points="20 6 9 17 4 12" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      Autofilled!
    `;

    setTimeout(() => {
      btn.classList.remove('success');
      content.innerHTML = `
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="white">
          <path d="M13 2L4.09 12.96A1 1 0 005 14.5h5.5L11 22l8.91-10.96A1 1 0 0019 9.5H13.5L13 2z"/>
        </svg>
        Autofill Now
      `;
    }, 2500);
  }
</script>

</body>
</html>
